<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRO VIP - لوحة التحكم</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap');
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
        }
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }
        .btn-admin {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        }
        .sidebar-item {
            transition: all 0.2s ease;
        }
        .sidebar-item:hover {
            background: rgba(59, 130, 246, 0.1);
            color: #3b82f6;
        }
        .active-section {
            display: block !important;
        }
        .hidden-section {
            display: none;
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1e293b;
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- Auth Section -->
    <div id="auth-section" class="w-full max-w-md space-y-6">
        <!-- Login Form -->
        <div id="login-form" class="glass p-8 rounded-2xl shadow-2xl">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-blue-500 mb-2">تسجيل الدخول</h1>
                <p class="text-slate-400">مرحباً بك في BRO VIP</p>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">اسم المستخدم</label>
                    <input type="text" id="login-user" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="أدخل اسم المستخدم">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">كلمة المرور</label>
                    <input type="password" id="login-pass" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="••••••••">
                </div>
                <button onclick="handleLogin()" class="w-full btn-primary py-3 rounded-lg font-bold text-lg mt-4">دخول</button>
                <div class="text-center text-sm mt-4">
                    ليس لديك حساب؟ <a href="#" onclick="toggleAuth('register')" class="text-blue-400 hover:underline">إنشاء حساب جديد</a>
                </div>
                <hr class="border-slate-700 my-6">
                <button onclick="toggleAuth('admin-login')" class="w-full border border-red-500 text-red-500 hover:bg-red-500 hover:text-white py-2 rounded-lg font-medium transition-all">دخول إلى لوحة الأدمن</button>
            </div>
        </div>

        <!-- Register Form -->
        <div id="register-form" class="glass p-8 rounded-2xl shadow-2xl hidden-section">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-green-500 mb-2">إنشاء حساب</h1>
                <p class="text-slate-400">انضم إلى مجتمعنا الآن</p>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">اسم المستخدم</label>
                    <input type="text" id="reg-user" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 focus:ring-2 focus:ring-green-500 outline-none" placeholder="أدخل اسم المستخدم">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">البريد الإلكتروني</label>
                    <input type="email" id="reg-email" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 focus:ring-2 focus:ring-green-500 outline-none" placeholder="example@mail.com">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">كلمة المرور</label>
                    <input type="password" id="reg-pass" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 focus:ring-2 focus:ring-green-500 outline-none" placeholder="••••••••">
                </div>
                <button onclick="handleRegister()" class="w-full bg-green-600 hover:bg-green-700 py-3 rounded-lg font-bold text-lg mt-4 transition-all">إنشاء الحساب</button>
                <div class="text-center text-sm mt-4">
                    لديك حساب بالفعل؟ <a href="#" onclick="toggleAuth('login')" class="text-green-400 hover:underline">تسجيل الدخول</a>
                </div>
            </div>
        </div>

        <!-- Admin Login Form -->
        <div id="admin-login-form" class="glass p-8 rounded-2xl shadow-2xl hidden-section">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-red-500 mb-2">لوحة الإدارة</h1>
                <p class="text-slate-400">الوصول للمصرح لهم فقط</p>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">كود الوصول (User)</label>
                    <input type="text" id="admin-user" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 focus:ring-2 focus:ring-red-500 outline-none" placeholder="أدخل اليوزر">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">كلمة السر (Password)</label>
                    <input type="password" id="admin-pass" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 focus:ring-2 focus:ring-red-500 outline-none" placeholder="••••••••">
                </div>
                <button onclick="handleAdminLogin()" class="w-full btn-admin py-3 rounded-lg font-bold text-lg mt-4">دخول المسؤول</button>
                <button onclick="toggleAuth('login')" class="w-full text-slate-400 hover:text-white py-2 text-sm">رجوع للخلف</button>
            </div>
        </div>
    </div>

    <!-- Main Dashboard Section (Hidden by default) -->
    <div id="dashboard-section" class="w-full h-screen fixed inset-0 glass overflow-hidden hidden-section">
        <div class="flex h-full">
            <!-- Sidebar -->
            <div class="w-64 bg-slate-900 border-l border-slate-800 flex flex-col">
                <div class="p-6 text-center border-b border-slate-800">
                    <h2 id="dashboard-title" class="text-2xl font-bold text-blue-500">BRO VIP</h2>
                    <p id="user-display-name" class="text-xs text-slate-400 mt-1"></p>
                </div>
                <nav class="flex-1 overflow-y-auto p-4 space-y-2" id="sidebar-nav">
                    <!-- Nav items will be injected here -->
                </nav>
                <div class="p-4 border-t border-slate-800">
                    <button onclick="logout()" class="w-full flex items-center justify-center gap-2 text-red-400 hover:bg-red-400/10 py-2 rounded-lg transition-all">
                        <i class="fas fa-sign-out-alt"></i> تسجيل الخروج
                    </button>
                </div>
            </div>

            <!-- Content Area -->
            <div class="flex-1 flex flex-col overflow-hidden">
                <!-- Header -->
                <header class="h-16 bg-slate-900/50 border-b border-slate-800 flex items-center justify-between px-8">
                    <h3 id="current-page-title" class="text-xl font-semibold">الرئيسية</h3>
                    <div class="flex items-center gap-4">
                        <div class="flex items-center gap-2 bg-slate-800 px-3 py-1 rounded-full text-sm">
                            <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                            البوت متصل
                        </div>
                    </div>
                </header>

                <!-- Main Content -->
                <main class="flex-1 overflow-y-auto p-8" id="main-content">
                    <!-- Pages will be injected here -->
                </main>
            </div>
        </div>
    </div>

    <!-- Token Modal -->
    <div id="token-modal" class="fixed inset-0 bg-black/80 flex items-center justify-center z-50 hidden-section p-4">
        <div class="glass p-8 rounded-2xl max-w-md w-full">
            <h2 class="text-2xl font-bold mb-4">إعدادات البوت</h2>
            <p class="text-slate-400 mb-6">يرجى إدخال توكن البوت (Bot Token) للربط مع التيليجرام.</p>
            <input type="text" id="bot-token-input" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 mb-6 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="8955611629:AAEz2FbnMisJj4qR...">
            <div class="flex gap-4">
                <button onclick="saveToken()" class="flex-1 btn-primary py-2 rounded-lg font-bold">حفظ التوكن</button>
                <button onclick="closeTokenModal()" class="flex-1 bg-slate-700 hover:bg-slate-600 py-2 rounded-lg">إغلاق</button>
            </div>
        </div>
    </div>

    <script>
        // Configuration
        let botToken = localStorage.getItem('bot_token') || "";
        let currentUser = JSON.parse(localStorage.getItem('current_user')) || null;
        let isAdmin = false;

        // Bot Functions mapping (matching the Python code)
        const userMenu = [
            { id: 'home', title: 'الرئيسية', icon: 'fa-home', color: 'text-blue-400' },
            { id: 'upload_file', title: '📤 رفع ملفات', icon: 'fa-upload', color: 'text-green-400' },
            { id: 'my_files', title: '📂 ملفاتي', icon: 'fa-folder-open', color: 'text-yellow-400' },
            { id: 'redeem_code', title: '🎟️ لدي كود', icon: 'fa-ticket-alt', color: 'text-purple-400' },
            { id: 'store_menu', title: '⭐ متجر الأكواد', icon: 'fa-shopping-cart', color: 'text-pink-400' },
            { id: 'ai_menu', title: '🧠 الذكاء الاصطناعي', icon: 'fa-robot', color: 'text-indigo-400' },
            { id: 'tools_menu', title: '👑 أدوات VIP', icon: 'fa-crown', color: 'text-amber-400' },
            { id: 'temp_mail_menu', title: '📧 بريد مؤقت', icon: 'fa-envelope', color: 'text-cyan-400' },
            { id: 'referral_menu', title: '👥 نظام الإحالة', icon: 'fa-users', color: 'text-emerald-400' },
            { id: 'my_account', title: '👤 حسابي', icon: 'fa-user-circle', color: 'text-slate-400' }
        ];

        const adminMenu = [
            { id: 'admin_stats', title: '📊 إحصائيات النظام', icon: 'fa-chart-line', color: 'text-red-400' },
            { id: 'admin_list_users', title: '👥 المستخدمين', icon: 'fa-users-cog', color: 'text-red-400' },
            { id: 'admin_broadcast', title: '📢 الإذاعة', icon: 'fa-bullhorn', color: 'text-red-400' },
            { id: 'admin_settings', title: '⚙️ إعدادات البوت', icon: 'fa-sliders-h', color: 'text-red-400' },
            { id: 'admin_malicious_files', title: '🦠 الملفات الخبيثة', icon: 'fa-biohazard', color: 'text-red-400' },
            { id: 'admin_codes_menu', title: '🎟️ إدارة الأكواد', icon: 'fa-key', color: 'text-red-400' },
            { id: 'admin_add_sub', title: '➕ إضافة اشتراك', icon: 'fa-plus-circle', color: 'text-red-400' },
            { id: 'admin_permissions', title: '🔐 صلاحيات الأدمن', icon: 'fa-user-shield', color: 'text-red-400' },
            { id: 'admin_create_backup', title: '💾 نسخة احتياطية', icon: 'fa-database', color: 'text-red-400' }
        ];

        // Auth Logic
        function toggleAuth(type) {
            document.getElementById('login-form').classList.add('hidden-section');
            document.getElementById('register-form').classList.add('hidden-section');
            document.getElementById('admin-login-form').classList.add('hidden-section');
            
            document.getElementById(`${type}-form`).classList.remove('hidden-section');
        }

        function handleLogin() {
            const user = document.getElementById('login-user').value;
            const pass = document.getElementById('login-pass').value;
            
            if (user && pass) {
                currentUser = { username: user, role: 'user' };
                isAdmin = false;
                initDashboard();
            } else {
                alert("يرجى إدخال البيانات");
            }
        }

        function handleRegister() {
            const user = document.getElementById('reg-user').value;
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;
            
            if (user && email && pass) {
                alert("تم إنشاء الحساب بنجاح! يمكنك الآن تسجيل الدخول.");
                toggleAuth('login');
            } else {
                alert("يرجى إكمال جميع الحقول");
            }
        }

        function handleAdminLogin() {
            const user = document.getElementById('admin-user').value;
            const pass = document.getElementById('admin-pass').value;
            
            if (user === "BR2_VIP" && pass === "BR2_VIP") {
                currentUser = { username: "الأدمن", role: 'admin' };
                isAdmin = true;
                initDashboard();
            } else {
                alert("بيانات الدخول خاطئة!");
            }
        }

        // Dashboard Logic
        function initDashboard() {
            document.getElementById('auth-section').classList.add('hidden-section');
            document.getElementById('dashboard-section').classList.remove('hidden-section');
            document.body.classList.remove('items-center', 'justify-center');
            
            document.getElementById('user-display-name').innerText = currentUser.username;
            document.getElementById('dashboard-title').innerText = isAdmin ? "لوحة الإدارة" : "لوحة المستخدم";
            document.getElementById('dashboard-title').className = isAdmin ? "text-2xl font-bold text-red-500" : "text-2xl font-bold text-blue-500";

            renderSidebar();
            loadPage('home');

            if (!botToken) {
                document.getElementById('token-modal').classList.remove('hidden-section');
            }
        }

        function renderSidebar() {
            const nav = document.getElementById('sidebar-nav');
            nav.innerHTML = "";
            const menu = isAdmin ? adminMenu : userMenu;
            
            menu.forEach(item => {
                const div = document.createElement('div');
                div.className = "sidebar-item flex items-center gap-3 p-3 rounded-xl cursor-pointer";
                div.onclick = () => loadPage(item.id);
                div.innerHTML = `<i class="fas ${item.icon} ${item.color} w-6 text-center"></i> <span>${item.title}</span>`;
                nav.appendChild(div);
            });
        }

        function loadPage(pageId) {
            const content = document.getElementById('main-content');
            const title = document.getElementById('current-page-title');
            
            const menu = isAdmin ? adminMenu : userMenu;
            const page = menu.find(p => p.id === pageId) || userMenu[0];
            title.innerText = page.title;

            // Page Templates
            let html = "";
            switch(pageId) {
                case 'home':
                    html = `
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div class="glass p-6 rounded-2xl border-r-4 border-blue-500">
                                <h4 class="text-slate-400 text-sm mb-1">المستخدمين النشطين</h4>
                                <p class="text-3xl font-bold">1,248</p>
                            </div>
                            <div class="glass p-6 rounded-2xl border-r-4 border-green-500">
                                <h4 class="text-slate-400 text-sm mb-1">الملفات المرفوعة</h4>
                                <p class="text-3xl font-bold">5,620</p>
                            </div>
                            <div class="glass p-6 rounded-2xl border-r-4 border-purple-500">
                                <h4 class="text-slate-400 text-sm mb-1">حالة السيرفر</h4>
                                <p class="text-3xl font-bold text-green-400">ممتاز</p>
                            </div>
                        </div>
                        <div class="mt-8 glass p-8 rounded-2xl">
                            <h3 class="text-xl font-bold mb-4">أهلاً بك في BRO VIP</h3>
                            <p class="text-slate-400 leading-relaxed">
                                هذه اللوحة مرتبطة بالكامل بالبوت الخاص بك. يمكنك التحكم في جميع الميزات من هنا مباشرة.
                                جميع الأزرار تعمل بنفس آلية البوت وتؤدي نفس الوظائف.
                            </p>
                        </div>
                    `;
                    break;
                case 'upload_file':
                    html = `
                        <div class="max-w-2xl mx-auto glass p-8 rounded-2xl text-center">
                            <i class="fas fa-cloud-upload-alt text-6xl text-blue-500 mb-6"></i>
                            <h3 class="text-2xl font-bold mb-2">رفع ملف جديد</h3>
                            <p class="text-slate-400 mb-8">ارسل ملف Python (.py) أو ملف ZIP يحتوي على مشروعك</p>
                            <div class="border-2 border-dashed border-slate-700 rounded-2xl p-12 mb-6 hover:border-blue-500 transition-all cursor-pointer" onclick="document.getElementById('file-input').click()">
                                <p class="text-slate-500">اسحب الملف هنا أو اضغط للاختيار</p>
                                <input type="file" id="file-input" class="hidden" onchange="handleFileUpload(this)">
                            </div>
                            <div id="upload-status" class="hidden text-sm p-3 rounded-lg bg-blue-500/10 text-blue-400">
                                جاري الرفع...
                            </div>
                        </div>
                    `;
                    break;
                case 'ai_menu':
                    html = `
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="glass p-6 rounded-2xl hover:bg-slate-800 transition-all cursor-pointer" onclick="callBotAPI('deepseek_ai')">
                                <i class="fas fa-ghost text-red-500 text-3xl mb-4"></i>
                                <h4 class="text-xl font-bold mb-2">WORM GPT 😈</h4>
                                <p class="text-slate-400 text-sm">محادثة غير محدودة مع الذكاء الاصطناعي القوي.</p>
                            </div>
                            <div class="glass p-6 rounded-2xl hover:bg-slate-800 transition-all cursor-pointer" onclick="callBotAPI('nano_banana')">
                                <i class="fas fa-paint-brush text-blue-500 text-3xl mb-4"></i>
                                <h4 class="text-xl font-bold mb-2">توليد صور 🎨</h4>
                                <p class="text-slate-400 text-sm">حول خيالك إلى صور واقعية بالذكاء الاصطناعي.</p>
                            </div>
                            <div class="glass p-6 rounded-2xl hover:bg-slate-800 transition-all cursor-pointer" onclick="callBotAPI('ai_tts')">
                                <i class="fas fa-microphone text-green-500 text-3xl mb-4"></i>
                                <h4 class="text-xl font-bold mb-2">تحويل نص إلى صوت 🎤</h4>
                                <p class="text-slate-400 text-sm">تحويل النصوص المكتوبة إلى أصوات طبيعية.</p>
                            </div>
                        </div>
                    `;
                    break;
                case 'admin_stats':
                    html = `
                        <div class="space-y-6">
                            <div class="glass p-6 rounded-2xl">
                                <h4 class="text-lg font-bold mb-4">إحصائيات السيرفر الحالية</h4>
                                <div class="space-y-4">
                                    <div>
                                        <div class="flex justify-between text-sm mb-1"><span>المعالج (CPU)</span><span>45%</span></div>
                                        <div class="w-full bg-slate-800 rounded-full h-2"><div class="bg-blue-500 h-2 rounded-full" style="width: 45%"></div></div>
                                    </div>
                                    <div>
                                        <div class="flex justify-between text-sm mb-1"><span>الذاكرة (RAM)</span><span>62%</span></div>
                                        <div class="w-full bg-slate-800 rounded-full h-2"><div class="bg-green-500 h-2 rounded-full" style="width: 62%"></div></div>
                                    </div>
                                    <div>
                                        <div class="flex justify-between text-sm mb-1"><span>المساحة (Disk)</span><span>28%</span></div>
                                        <div class="w-full bg-slate-800 rounded-full h-2"><div class="bg-yellow-500 h-2 rounded-full" style="width: 28%"></div></div>
                                    </div>
                                </div>
                            </div>
                            <button onclick="callBotAPI('admin_stats')" class="btn-primary px-6 py-2 rounded-lg">تحديث البيانات</button>
                        </div>
                    `;
                    break;
                default:
                    html = `
                        <div class="glass p-12 rounded-2xl text-center">
                            <i class="fas ${page.icon} text-5xl ${page.color} mb-6"></i>
                            <h3 class="text-2xl font-bold mb-4">صفحة ${page.title}</h3>
                            <p class="text-slate-400 mb-8">هذه الميزة تعمل تلقائياً من خلال البوت.</p>
                            <button onclick="callBotAPI('${pageId}')" class="btn-primary px-8 py-3 rounded-xl font-bold">تشغيل الأمر في البوت</button>
                        </div>
                    `;
            }
            content.innerHTML = html;
        }

        // Telegram API Integration
        async function callBotAPI(action) {
            if (!botToken) {
                document.getElementById('token-modal').classList.remove('hidden-section');
                return;
            }
            
            // This simulates sending a callback query or command to the bot
            // In a real scenario, you'd send a message to the bot's log channel or use a webhook
            alert(`تم إرسال طلب: ${action} إلى البوت بنجاح!`);
            
            try {
                // Example: Send notification to bot about web action
                const message = `🌐 إجراء من الموقع:\nالمستخدم: ${currentUser.username}\nالأمر: ${action}`;
                // We'll use the hardcoded ADMIN_ID from the bot if available, or just log it
                const chatId = "6763394804"; // From Python code ADMIN_ID
                
                await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: chatId,
                        text: message,
                        parse_mode: 'HTML'
                    })
                });
            } catch (e) {
                console.error("Telegram API Error:", e);
            }
        }

        async function handleFileUpload(input) {
            if (!botToken) {
                alert("يرجى إعداد توكن البوت أولاً");
                return;
            }

            const file = input.files[0];
            if (!file) return;

            const status = document.getElementById('upload-status');
            status.classList.remove('hidden-section');
            status.innerText = "جاري الرفع إلى البوت...";

            const formData = new FormData();
            formData.append('chat_id', "6763394804"); // ADMIN_ID for approval
            formData.append('document', file);
            formData.append('caption', `📤 ملف مرفوع من الموقع\nبواسطة: ${currentUser.username}`);

            try {
                const response = await fetch(`https://api.telegram.org/bot${botToken}/sendDocument`, {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                if (result.ok) {
                    status.innerText = "✅ تم الرفع بنجاح! سيتم فحص الملف من قبل الإدارة.";
                    status.className = "text-sm p-3 rounded-lg bg-green-500/10 text-green-400";
                } else {
                    throw new Error(result.description);
                }
            } catch (e) {
                status.innerText = "❌ فشل الرفع: " + e.message;
                status.className = "text-sm p-3 rounded-lg bg-red-500/10 text-red-400";
            }
        }

        // Settings Logic
        function saveToken() {
            const token = document.getElementById('bot-token-input').value;
            if (token) {
                botToken = token;
                localStorage.setItem('bot_token', token);
                closeTokenModal();
                alert("تم حفظ التوكن بنجاح!");
            }
        }

        function closeTokenModal() {
            document.getElementById('token-modal').classList.add('hidden-section');
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('current_user');
            location.reload();
        }

        // Initialize if logged in
        if (currentUser) {
            initDashboard();
        }
    </script>
</body>
</html>
